<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>A18 v4</title>

<style>
body{font-family:Arial;margin:0;background:#0f1f27;color:white;}
.container{max-width:1100px;margin:auto;padding:20px;}
input,button{padding:8px;margin:4px;border-radius:5px;border:none;}
button{background:#00c853;color:black;font-weight:bold;cursor:pointer;}
.box{background:#1c2d36;padding:10px;margin-top:10px;border-radius:10px;}
.row{display:flex;flex-wrap:wrap;gap:5px;margin:5px 0;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #444;padding:6px;text-align:center;}
th{background:#00c853;color:black;}
</style>
</head>

<body>

<div class="container">

<h2>🥕 A18 SYSTEM v4</h2>

<label>📅 Data</label>
<input type="date" id="date" onchange="loadDay()">

<label>🏪 Hurtownia</label>
<input id="shop">

<hr>

<div id="items"></div>

<button onclick="addItem()">➕ Dodaj produkt</button>
<button onclick="save()">💾 Zapisz hurtownię</button>

<hr>

<div id="list"></div>

</div>

<script>

let db = {};
let currentDate = "";
let items = [];
let editIndex = null;

// LOAD
function load(){
let data = localStorage.getItem("A18_v4");
db = data ? JSON.parse(data) : {};
}

// SAVE DB
function saveDB(){
localStorage.setItem("A18_v4", JSON.stringify(db));
}

// DATE
function loadDay(){
currentDate = date.value;
if(!db[currentDate]) db[currentDate] = [];
renderList();
}

// ADD ITEM
function addItem(){
items.push({name:"",qty:0,buy:0,sell:0,waste:0});
renderItems();
}

// RENDER ITEMS
function renderItems(){
let box = document.getElementById("items");
box.innerHTML="";

items.forEach((p,i)=>{
box.innerHTML += `
<div class="row">
<input value="${p.name}" placeholder="Nazwa" oninput="items[${i}].name=this.value">
<input type="number" value="${p.qty}" placeholder="Ilość" oninput="items[${i}].qty=+this.value">
<input type="number" value="${p.buy}" placeholder="Zakup" oninput="items[${i}].buy=+this.value">
<input type="number" value="${p.sell}" placeholder="Sprzedaż" oninput="items[${i}].sell=+this.value">
<input type="number" value="${p.waste}" placeholder="Utylizacja" oninput="items[${i}].waste=+this.value">
</div>
`;
});
}

// SAVE SHOP
function save(){
if(!currentDate || !shop.value){
alert("Вибери дату і гуртовню");
return;
}

let data = {
shop: shop.value,
items: JSON.parse(JSON.stringify(items))
};

if(editIndex === null){
db[currentDate].push(data);
}else{
db[currentDate][editIndex] = data;
editIndex = null;
}

items = [];
shop.value="";
renderItems();
saveDB();
renderList();
}

// CALC
function calc(z){
let cost=0, income=0;

z.items.forEach(p=>{
cost += p.qty * p.buy;
income += (p.qty - (p.waste||0)) * p.sell;
});

return {
cost,
income,
profit: income - cost
};
}

// RENDER LIST
function renderList(){
let out = document.getElementById("list");
out.innerHTML="";

if(!db[currentDate]) return;

db[currentDate].forEach((z,i)=>{

let c = calc(z);

let tableRows = "";

z.items.forEach(p=>{
tableRows += `
<tr>
<td>${p.name}</td>
<td>${p.qty}</td>
<td>${p.buy}</td>
<td>${p.sell}</td>
<td>${p.waste||0}</td>
</tr>
`;
});

out.innerHTML += `
<div class="box">

<h3>🏪 ${z.shop}</h3>

<table>
<tr>
<th>Nazwa</th>
<th>Ilość</th>
<th>Zakup</th>
<th>Sprzedaż</th>
<th>Utylizacja</th>
</tr>
${tableRows}
</table>

<p>💰 Koszt: ${c.cost.toFixed(2)} zł</p>
<p>💵 Przychód: ${c.income.toFixed(2)} zł</p>
<p>📈 Zysk: ${c.profit.toFixed(2)} zł</p>

<button onclick="edit(${i})">✏️ Edytuj</button>
<button onclick="del(${i})">❌ Usuń</button>
<button onclick="printShop(${i})">🧾 Drukuj</button>

</div>
`;
});
}

// EDIT
function edit(i){
let z = db[currentDate][i];

shop.value = z.shop;
items = JSON.parse(JSON.stringify(z.items));
editIndex = i;

renderItems();
}

// DELETE
function del(i){
db[currentDate].splice(i,1);
saveDB();
renderList();
}

// PRINT
function printShop(i){
let z = db[currentDate][i];
let c = calc(z);

let win = window.open("");

let html = `
<html>
<body>
<h2>${z.shop}</h2>
<p>${currentDate}</p>
<table border="1" style="width:100%;text-align:center;">
<tr><th>Nazwa</th><th>Ilość</th><th>Zakup</th><th>Sprzedaż</th></tr>
`;

z.items.forEach(p=>{
html += `<tr>
<td>${p.name}</td>
<td>${p.qty}</td>
<td>${p.buy}</td>
<td>${p.sell}</td>
</tr>`;
});

html += `
</table>
<h3>Koszt: ${c.cost}</h3>
<h3>Zysk: ${c.profit}</h3>
<script>window.print()<\/script>
</body>
</html>
`;

win.document.write(html);
win.document.close();
}

// INIT
window.onload = ()=>{
load();
}

</script>

</body>
</html>
